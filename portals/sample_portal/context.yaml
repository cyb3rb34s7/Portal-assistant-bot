# Portal context file for the sample portal shipped in sample_portal/.
# Used by the agent's planner stage to ground its reasoning about goals
# expressed in natural language.
#
# Schema: pilot/agent/schemas/portal_context.py :: PortalContext

schema_version: 1

portal_id: sample_portal
name: "CurationPilot Sample Portal"
base_url: "http://localhost:5173"

glossary:
  - term: "content"
    meaning: >
      A piece of media tracked by a stable identifier of the form
      A-NNNN. Operators receive a CSV listing 4-5 contents per drop,
      each with title, image_path, category, and release_date.
    aliases: ["asset", "item"]

  - term: "layout"
    meaning: >
      One of three pre-built arrangements of content slots:
      grid-2x2 (4 slots), featured-row (4 slots), carousel (5 slots).
      The operator picks one layout per curation session.
    aliases: ["template"]

  - term: "slot"
    meaning: >
      A position in the chosen layout. Slots are 1-indexed. Each slot
      holds one content (picked from the dropdown of uploaded contents)
      and one image (uploaded from disk).
    aliases: ["position"]

  - term: "curation"
    meaning: >
      The end-to-end workflow: upload CSV, pick layout, fill slots
      with contents+images, comment, save, apply.

page_map:
  - path: "/upload"
    role: "intake"
    notes: >
      CSV upload tab. Requires columns: content_id, title, image_path,
      category, release_date. Renders the parsed table for visual
      confirmation. Must run before /curation.

  - path: "/curation"
    role: "primary_workflow"
    notes: >
      Single-screen workflow. (1) pick a layout from three options;
      (2) fill each slot with a content (dropdown sourced from the
      uploaded CSV); (3) upload each slot's image; (4) write a
      comment; (5) save; (6) apply.

field_conventions:
  - field: "content_id"
    format: "A-NNNN"
    examples: ["A-9001", "A-9042", "A-7777"]

  - field: "release_date"
    format: "YYYY-MM-DD"
    timezone: "UTC"

  - field: "layout_id"
    format: "one of: grid-2x2, featured-row, carousel"
    examples: ["grid-2x2", "featured-row", "carousel"]

  - field: "image_path"
    format: "absolute or repo-relative path to a PNG / JPG"
    examples: ["tests/fixtures/images/A-9001.png"]

destructive_actions:
  - "save_layout"   # writes a saved draft to local storage
  - "apply_layout"  # commits the saved draft to the applied list

session:
  login_url: ""
  session_duration_minutes: null
  sso_provider: "none"
  notes: >
    Sample portal has no authentication.
